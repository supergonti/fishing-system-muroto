name: Update forecast (5x daily)

# 出船判断ページ用の forecast_data.json を 1 日 5 回（JST 6/9/12/15/18）自動更新する。
# 旧 fishing-system/.github/workflows/update-forecast.yml を Muroto 構造
# （shared.engines + areas/muroto/data/forecast_data.json）に適合化。

on:
  schedule:
    # 日本時間 6・9・12・15・18時に実行（UTC換算）
    - cron: '0 21,0,3,6,9 * * *'
  workflow_dispatch:  # GitHub画面から手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 海況・気象データ取得
        run: python3 -m shared.engines.fetch_forecast --output areas/muroto/data/forecast_data.json

      - name: forecast_data.json をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add areas/muroto/data/forecast_data.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "🌊 予報データ更新 $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
