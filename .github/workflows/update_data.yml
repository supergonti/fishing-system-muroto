name: Update offshore current data (CMEMS, daily 06:30 JST)

# 室戸沖の海流データ（CMEMS / Copernicus Marine）を毎日 1 回（JST 06:30）
# 自動取得し、shared/current/muroto/muroto_offshore_current_all.csv を更新、
# 続いて areas/muroto/data/js/muroto_offshore_current_dashboard_data.js を再生成する。
#
# 旧 fishing-system/.github/workflows/update_data.yml を Muroto 構造
# （shared.engines.* + shared/current/muroto + areas/muroto/data/js）に
# 適合化したもの。
#
#  - W6-3-fix（2026-04-20）: TZ=Asia/Tokyo で JST 基準の「前日」を計算。
#  - W6-4（2026-04-23）: CMEMS 認証失敗時 / 取得 0 件時の silent failure を検出。
#  - Wave 1 T-F: shared/engines/config.py が MUROTO_CURRENT_OUTPUT_DIR を参照する
#    ようパラメトリック化済み。本 workflow ではその env を明示的に注入する。

on:
  schedule:
    # 毎日 21:30 UTC = 翌 6:30 JST に実行
    - cron: '30 21 * * *'
  workflow_dispatch:
    # 手動実行も可能（テスト・強制更新に使用）
    inputs:
      target_date:
        description: '取得日付 (例: 2026-04-11)。空欄なら前日を自動取得'
        required: false
        default: ''
      collect_all:
        description: '⚠️ 全データ再収集 — 座標修正後の全期間取得に使用。実行する場合は「true」と入力'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # CSVとJSのコミット・プッシュに必要

    env:
      # Wave 1 T-F で導入した shared/engines/config.py の OUTPUT_DIR 上書き用 env。
      # この env が無いと旧来の "data/" 配下に出力されてしまうため必ず設定する。
      MUROTO_CURRENT_OUTPUT_DIR: shared/current/muroto

    steps:
      # ① リポジトリをチェックアウト
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ② Python 3.11 をセットアップ
      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ③ 依存パッケージをインストール
      #    Muroto には現状 requirements.txt が無いため旧版の pip install リストを踏襲。
      #    requirements.txt が追加された場合は `pip install -r requirements.txt` に切替可。
      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install \
            "copernicusmarine>=2.0.0" \
            "xarray>=2024.1.0" \
            "netCDF4>=1.6.0" \
            "h5py>=3.10.0" \
            "pandas>=2.0.0" \
            "numpy>=1.24.0" \
            "requests>=2.31.0"

      # ④ 出力ディレクトリ作成（Muroto 構造）
      - name: 出力ディレクトリ準備
        run: |
          mkdir -p shared/current/muroto
          mkdir -p areas/muroto/data/js

      # ⑤ データ取得（前日分 or 全期間再収集）
      #    CMEMS認証は環境変数で自動処理（login()不要）
      - name: データ取得
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: |
          set -o pipefail
          if [ "${{ github.event.inputs.collect_all }}" = "true" ]; then
            echo "⚠️ 全データ再収集モード（2022-01-01 〜 今日）"
            python3 -m shared.engines.main --all --no-skip 2>&1 | tee /tmp/fetch.log
          elif [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET="${{ github.event.inputs.target_date }}"
            echo "取得日付: $TARGET"
            python3 -m shared.engines.main --date "$TARGET" 2>&1 | tee /tmp/fetch.log
          else
            # W6-3-fix（2026-04-20）: TZ=Asia/Tokyo で JST 基準の「前日」を計算。
            # 旧実装は UTC 基準で `date -d "yesterday"` を評価していたため、
            # 06:30 JST = 21:30 UTC の runner では UTC の yesterday が
            # JST の「一昨日」扱いになっており、4/20 朝に 4/18 を取得する
            # バグがあった（sync_after_master_push で取得済の日と衝突して
            # 差分ゼロ → sync_after_current_update が発火しない副作用）。
            TARGET=$(TZ=Asia/Tokyo date -d "yesterday" +%Y-%m-%d)
            echo "取得日付: $TARGET（前日 / JST 基準）"
            python3 -m shared.engines.main --date "$TARGET" 2>&1 | tee /tmp/fetch.log
          fi

          # W6-4（2026-04-23）: CMEMS認証失敗時に workflow が success のまま
          # 通り抜ける silent failure を防ぐ。取得成功 0 かつ失敗 > 0 ならジョブを失敗させる。
          if grep -q "I forgot my username or my password" /tmp/fetch.log; then
            echo "::error title=CMEMS認証失敗::CMEMS_USERNAME / CMEMS_PASSWORD が無効です。GitHub Secrets を再設定してください。"
            exit 1
          fi
          if grep -qE "取得成功:\s*0 日" /tmp/fetch.log && grep -qE "失敗:\s*[1-9]" /tmp/fetch.log; then
            echo "::error title=データ取得失敗::全日取得に失敗しました。上のログを確認してください。"
            exit 1
          fi

      # ⑥ ダッシュボード用JSファイルを再生成
      - name: ダッシュボードJS を再生成
        run: python3 -m shared.engines.update_offshore_dashboard_data

      # ⑦ 変更があればコミット＆プッシュ
      - name: コミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add shared/current/muroto/muroto_offshore_current_all.csv || true
          git add shared/current/muroto/muroto_offshore_current_*.csv || true
          git add areas/muroto/data/js/muroto_offshore_current_dashboard_data.js || true

          if git diff --staged --quiet; then
            echo "変更なし（既に最新データ）。コミットをスキップします。"
          else
            if [ -n "${{ github.event.inputs.target_date }}" ]; then
              DATE_LABEL="${{ github.event.inputs.target_date }}"
            else
              # W6-3-fix: DATE_LABEL も JST 基準で算出（TARGET と一致させる）
              DATE_LABEL=$(TZ=Asia/Tokyo date -d "yesterday" +%Y-%m-%d)
            fi
            # 本 workflow からは [skip ci] 付きで commit する。
            # 連鎖発火は Wave 3 T-C の sync_after_current_update.yml が
            # workflow_run トリガーで担う。
            git commit -m "海流データ自動更新 (Muroto): ${DATE_LABEL} [skip ci]"
            git push
            echo "コミット＆プッシュ完了"
          fi
